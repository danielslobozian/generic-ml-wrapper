sonar.organization=danielslobozian
sonar.projectKey=danielslobozian_generic-ml-wrapper

# Single package: production sources and their tests.
sonar.sources=src
sonar.tests=tests

# Supported runtimes (matches the CI test matrix).
sonar.python.version=3.11, 3.12, 3.13

# Coverage report produced by the CI `sonar` nox session (Cobertura XML). Paths
# inside it are repo-root-relative (see .coveragerc: relative_files = true) so they
# resolve against sonar.sources (src/) in SonarQube Cloud.
sonar.python.coverage.reportPaths=coverage.xml
