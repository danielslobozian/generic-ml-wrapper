# Publish to PyPI via Trusted Publishing (OIDC) when a GitHub Release is published. No
# token or secret: PyPI trusts this exact repo + workflow (release.yml) + environment
# (pypi), and GitHub mints a short-lived OIDC credential for the upload -- so switching
# the trigger from tag-push to release-published needs NO PyPI-side change (the trust is
# keyed on the filename + environment, both unchanged).
#
# Release flow: bump VERSION + CHANGELOG on a release branch, merge to main, then publish
# a GitHub Release whose tag (vX.Y.Z) points at main's head. The Release is the front door
# -- it carries the human notes and creates the tag; this workflow reacts to it. Every
# build-time input is pinned (Actions by commit SHA, uv by [tool.uv] required-version).
name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # Fail fast if the Release's tag does not match VERSION, so a mistagged release (e.g.
  # a v0.7.0 Release cut against a commit still on 0.6.0) never builds and publishes the
  # wrong version. On a release event GITHUB_REF_NAME is the tag the Release points at.
  guard:
    name: Tag matches version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Tag must equal VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(tr -d '[:space:]' < VERSION)"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match VERSION ($version)"
            exit 1
          fi
          echo "tag v$tag matches VERSION $version"

  pypi-publish:
    name: Build and publish to PyPI
    needs: guard
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish --trusted-publishing always
